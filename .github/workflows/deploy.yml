name: Deploy to Vercel on Fork Sync

on:
  # 监听推送到主分支（同步上游仓库时会自动触发 push）
  push:
    branches:
      - main  # 确保是对主分支的推送
  # 手动触发（可选）
  workflow_dispatch:
  
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact to Vercel
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist  # 这里的 'dist' 是构建后输出的文件夹，可以根据你的项目更改

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # 使用 Vercel 的 Deploy Hook URL 进行部署触发
          vercel-token: ${{ secrets.VERCEL_API_TOKEN }}  # 添加一个 Vercel 的 API token
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}  # 需要你在 Vercel 设置的项目 ID
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}  # 需要你在 Vercel 设置的组织 ID
